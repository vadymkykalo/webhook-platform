server:
  shutdown: graceful

spring:
  application:
    name: webhook-platform-worker
  lifecycle:
    timeout-per-shutdown-phase: 30s
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:webhook_redis_pass}
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:webhook_platform}
    username: ${DB_USER:webhook_user}
    password: ${DB_PASSWORD:webhook_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:50}
      minimum-idle: ${DB_POOL_MIN_IDLE:20}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      delivery-concurrency: ${KAFKA_DELIVERY_CONCURRENCY:6}
      incoming-concurrency: ${KAFKA_INCOMING_CONCURRENCY:3}
      group-id: webhook-worker
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: ${KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
      enable-auto-commit: false
      max-retries: ${KAFKA_CONSUMER_MAX_RETRIES:3}
      retry-interval-ms: ${KAFKA_CONSUMER_RETRY_INTERVAL_MS:5000}
      properties:
        spring.json.trusted.packages: "com.webhook.platform.common.dto"
    listener:
      ack-mode: manual
      observation-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  server:
    port: ${MANAGEMENT_PORT:8081}

webhook:
  encryption-key: ${WEBHOOK_ENCRYPTION_KEY}
  encryption-salt: ${WEBHOOK_ENCRYPTION_SALT}
  url-validation:
    allow-private-ips: ${WEBHOOK_ALLOW_PRIVATE_IPS:false}
    allowed-hosts: ${WEBHOOK_ALLOWED_HOSTS:}
  max-concurrent-per-endpoint: ${WEBHOOK_MAX_CONCURRENT_PER_ENDPOINT:5}

retry:
  scheduler:
    poll-interval-ms: ${RETRY_SCHEDULER_POLL_INTERVAL_MS:10000}
    batch-size: ${RETRY_SCHEDULER_BATCH_SIZE:100}
    send-timeout-seconds: ${RETRY_SCHEDULER_SEND_TIMEOUT_SECONDS:30}
    reschedule-delay-seconds: ${RETRY_SCHEDULER_RESCHEDULE_DELAY_SECONDS:60}

dlq:
  monitoring:
    interval-ms: ${DLQ_MONITORING_INTERVAL_MS:60000}

ordering:
  gap-timeout-seconds: ${ORDERING_GAP_TIMEOUT_SECONDS:60}
  delivered-seq-ttl-hours: ${ORDERING_DELIVERED_SEQ_TTL_HOURS:24}
  buffer-ttl-minutes: ${ORDERING_BUFFER_TTL_MINUTES:10}

circuit-breaker:
  failure-rate-threshold: ${CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD:50}
  minimum-calls: ${CIRCUIT_BREAKER_MINIMUM_CALLS:5}
  wait-duration-seconds: ${CIRCUIT_BREAKER_WAIT_DURATION_SECONDS:30}
  window-ttl-seconds: ${CIRCUIT_BREAKER_WINDOW_TTL_SECONDS:120}

queue-depth:
  metrics:
    interval-ms: ${QUEUE_DEPTH_METRICS_INTERVAL_MS:900000}
    retention-days: ${QUEUE_DEPTH_METRICS_RETENTION_DAYS:30}

stuck-delivery:
  threshold-minutes: ${STUCK_DELIVERY_THRESHOLD_MINUTES:5}
  check-interval-ms: ${STUCK_DELIVERY_CHECK_INTERVAL_MS:60000}

stuck-forward:
  threshold-minutes: ${STUCK_FORWARD_THRESHOLD_MINUTES:5}
  check-interval-ms: ${STUCK_FORWARD_CHECK_INTERVAL_MS:60000}

incoming-forward:
  retry:
    poll-interval-ms: ${INCOMING_FORWARD_RETRY_POLL_INTERVAL_MS:10000}
    batch-size: ${INCOMING_FORWARD_RETRY_BATCH_SIZE:50}
    max-per-destination: ${INCOMING_FORWARD_RETRY_MAX_PER_DEST:10}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.webhook.platform: ${LOG_LEVEL:INFO}
