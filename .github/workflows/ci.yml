name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend Build & Compile
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Compile all modules
        run: mvn clean compile -B
        
      - name: Package artifacts
        run: mvn package -DskipTests -B

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run unit tests
        run: mvn test -B -Dtest='!*IntegrationTest,!*IT,!*RepositoryTest,!*ConcurrencyTest,!*RbacTest,!*IsolationTest' --fail-at-end
      
      - name: Test Summary
        if: always()
        run: |
          echo "### Backend Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Unit tests completed. See workflow logs for details." >> $GITHUB_STEP_SUMMARY

  backend-integration-test:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run integration tests with Testcontainers
        run: mvn test -B -Dtest='*RepositoryTest,*IntegrationTest,*IT,*ConcurrencyTest,*RbacTest,*IsolationTest' -DfailIfNoTests=false --fail-at-end
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
          DOCKER_API_VERSION: "1.44"
      
      - name: Integration Test Summary
        if: always()
        run: |
          echo "### Backend Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Integration tests with Testcontainers completed." >> $GITHUB_STEP_SUMMARY
          echo "- PostgreSQL: Testcontainers" >> $GITHUB_STEP_SUMMARY

  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webhook-platform-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: webhook-platform-ui
        run: npm ci
      
      - name: Run ESLint
        working-directory: webhook-platform-ui
        run: npm run lint
      
      - name: Run TypeScript typecheck
        working-directory: webhook-platform-ui
        run: npm run typecheck

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webhook-platform-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: webhook-platform-ui
        run: npm ci
      
      - name: Run tests
        working-directory: webhook-platform-ui
        run: npm run test:ci
      
      - name: Test Summary
        if: always()
        run: |
          echo "### Frontend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Vitest unit tests completed. See workflow logs for details." >> $GITHUB_STEP_SUMMARY

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webhook-platform-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: webhook-platform-ui
        run: npm ci
      
      - name: Build production bundle
        working-directory: webhook-platform-ui
        run: npm run build
      
      - name: Build Summary
        if: always()
        run: |
          echo "### Frontend Build Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ ESLint passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ TypeScript typecheck passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Production build successful" >> $GITHUB_STEP_SUMMARY

  security-sast:
    name: SAST (SpotBugs)
    runs-on: ubuntu-latest
    needs: backend-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run SpotBugs analysis
        run: mvn compile com.github.spotbugs:spotbugs-maven-plugin:4.8.3.1:check -B -DskipTests
        continue-on-error: true
      
      - name: SAST Summary
        if: always()
        run: |
          echo "### SAST (SpotBugs) Results" >> $GITHUB_STEP_SUMMARY
          echo "Static analysis completed. Check workflow logs for findings." >> $GITHUB_STEP_SUMMARY

  security-sca:
    name: SCA (OWASP Dependency-Check)
    runs-on: ubuntu-latest
    needs: backend-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:9.0.9:aggregate -B -DskipTests -DfailBuildOnCVSS=9
        continue-on-error: true
      
      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 14
      
      - name: SCA Summary
        if: always()
        run: |
          echo "### SCA (OWASP Dependency-Check) Results" >> $GITHUB_STEP_SUMMARY
          echo "Dependency vulnerability scan completed. Report uploaded as artifact." >> $GITHUB_STEP_SUMMARY

  docker-build:
    name: Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, backend-integration-test, frontend-build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image
        run: docker build -f webhook-platform-api/Dockerfile -t webhook-platform-api:test .
      
      - name: Build Worker image
        run: docker build -f webhook-platform-worker/Dockerfile -t webhook-platform-worker:test .
      
      - name: Build UI image
        run: docker build -f webhook-platform-ui/Dockerfile -t webhook-platform-ui:test .
      
      - name: Docker Build Summary
        if: always()
        run: |
          echo "### Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ All images built successfully" >> $GITHUB_STEP_SUMMARY

  container-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    continue-on-error: true
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image for scan
        run: docker build -f webhook-platform-api/Dockerfile -t webhook-platform-api:test .
      
      - name: Build Worker image for scan
        run: docker build -f webhook-platform-worker/Dockerfile -t webhook-platform-worker:test .
      
      - name: Build UI image for scan
        run: docker build -f webhook-platform-ui/Dockerfile -t webhook-platform-ui:test .
      
      - name: Run Trivy on API image
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: 'webhook-platform-api:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        env:
          TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db:2'
          TRIVY_JAVA_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-java-db:1'
      
      - name: Run Trivy on Worker image
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: 'webhook-platform-worker:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        env:
          TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db:2'
          TRIVY_JAVA_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-java-db:1'
      
      - name: Run Trivy on UI image
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: 'webhook-platform-ui:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        env:
          TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db:2'
          TRIVY_JAVA_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-java-db:1'
      
      - name: Container Scan Summary
        if: always()
        run: |
          echo "### Container Scan (Trivy) Results" >> $GITHUB_STEP_SUMMARY
          echo "Container vulnerability scan completed for all images." >> $GITHUB_STEP_SUMMARY
