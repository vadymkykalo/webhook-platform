# ============================================================================
# Production overrides for Webhook Platform
# ============================================================================
# Usage (via Makefile — recommended):
#   make up-prod              (embedded DB)
#   make up-prod-external     (external/managed DB)
#
# Manual usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
#
# Pre-built images:
#   Set DOCKER_REGISTRY in .env to pull from your registry, e.g.:
#     DOCKER_REGISTRY=ghcr.io/yourorg
#   Images will resolve to:
#     ghcr.io/yourorg/webhook-platform-api:latest
#     ghcr.io/yourorg/webhook-platform-worker:latest
#     ghcr.io/yourorg/webhook-platform-ui:latest
#
# This file overrides the base docker-compose.yml with production settings:
#   - Uses pre-built images from registry (run with --no-build)
#   - Stricter security (no Swagger, no private IPs, SSL for DB)
#   - API port not exposed publicly (traffic goes through UI nginx proxy)
#   - Production-safe log levels and email enabled

services:
  api:
    image: ${DOCKER_REGISTRY:-webhook-platform}-api:${API_IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    environment:
      APP_ENV: production
      SPRING_PROFILES_ACTIVE: production
      SWAGGER_ENABLED: "false"
      WEBHOOK_ALLOW_PRIVATE_IPS: "false"
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
      LOG_LEVEL: ${LOG_LEVEL:-WARN}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      ALERTS_NOTIFICATIONS_ENABLED: ${ALERTS_NOTIFICATIONS_ENABLED:-true}

  worker:
    image: ${DOCKER_REGISTRY:-webhook-platform}-worker:${WORKER_IMAGE_TAG:-latest}
    environment:
      APP_ENV: production
      SPRING_PROFILES_ACTIVE: production
      WEBHOOK_ALLOW_PRIVATE_IPS: "false"
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
      LOG_LEVEL: ${LOG_LEVEL:-WARN}

  ui:
    image: ${DOCKER_REGISTRY:-webhook-platform}-ui:${UI_IMAGE_TAG:-latest}
