{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "hookflow.fullname" . }}-db-backup
  labels:
    {{- include "hookflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.backup.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.backup.failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.backup.activeDeadlineSeconds | default 3600 }}
      template:
        metadata:
          labels:
            {{- include "hookflow.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          {{- with .Values.global.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: pg-backup
              image: {{ .Values.backup.image | default "postgres:16-alpine" }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/backup/hookflow-${TIMESTAMP}.dump"

                  echo "[$(date)] Starting backup to ${BACKUP_FILE}..."
                  pg_dump \
                    -h "${DB_HOST}" \
                    -p "${DB_PORT}" \
                    -U "${DB_USERNAME}" \
                    -d "${DB_NAME}" \
                    -Fc \
                    --no-owner \
                    --no-privileges \
                    -f "${BACKUP_FILE}"

                  FILESIZE=$(du -h "${BACKUP_FILE}" | cut -f1)
                  echo "[$(date)] Backup completed: ${BACKUP_FILE} (${FILESIZE})"

                  # Prune old backups — keep last N
                  KEEP={{ .Values.backup.retainCount | default 7 }}
                  cd /backup
                  ls -1t hookflow-*.dump 2>/dev/null | tail -n +$((KEEP + 1)) | xargs -r rm -v
                  echo "[$(date)] Pruned old backups, keeping last ${KEEP}"
              env:
                - name: DB_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "hookflow.fullname" . }}-config
                      key: DB_HOST
                - name: DB_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "hookflow.fullname" . }}-config
                      key: DB_PORT
                - name: DB_NAME
                  value: {{ .Values.postgresql.auth.database | default .Values.postgresql.external.database | quote }}
                - name: DB_USERNAME
                  value: {{ .Values.postgresql.auth.username | default .Values.postgresql.external.username | quote }}
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postgresql.auth.existingSecret | default .Values.postgresql.external.existingSecret }}
                      key: {{ .Values.postgresql.external.existingSecretPasswordKey | default "password" }}
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: {{ .Values.backup.existingClaim | default (printf "%s-db-backup" (include "hookflow.fullname" .)) }}
---
{{- if not .Values.backup.existingClaim }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hookflow.fullname" . }}-db-backup
  labels:
    {{- include "hookflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backup.storageSize | default "10Gi" }}
  {{- if .Values.backup.storageClass }}
  storageClassName: {{ .Values.backup.storageClass }}
  {{- end }}
{{- end }}
{{- end }}
