{{- if .Values.kafka.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hookflow.fullname" . }}-kafka-topics
  labels:
    {{- include "hookflow.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      name: {{ include "hookflow.fullname" . }}-kafka-topics
      labels:
        {{- include "hookflow.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topics
          image: apache/kafka:3.7.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              KAFKA_SERVER="{{ include "hookflow.kafka.bootstrapServers" . }}"
              PARTITIONS={{ .Values.kafka.topicPartitions | default 12 }}
              
              echo "Creating Kafka topics with $PARTITIONS partitions..."
              
              for topic in deliveries.dispatch deliveries.retry.1m deliveries.retry.5m deliveries.retry.15m deliveries.retry.1h deliveries.retry.6h deliveries.retry.24h deliveries.dlq; do
                /opt/kafka/bin/kafka-topics.sh \
                  --bootstrap-server $KAFKA_SERVER \
                  --create \
                  --if-not-exists \
                  --topic $topic \
                  --partitions $PARTITIONS \
                  --replication-factor 1 || true
                echo "  ✓ $topic"
              done
              
              echo "All topics created successfully"
{{- end }}
